name: release

# Publish to PyPI when a `v*` tag is pushed (e.g. v0.2.0).
#
# TODO (one-time, manual): before the first run, the maintainer must:
#   1. Register the `email-service` project name on PyPI.
#   2. Configure a Trusted Publisher mapping under "Publishing" for this
#      GitHub repo + the `release` workflow + `pypi` environment.
#      Docs: https://docs.pypi.org/trusted-publishers/
# Once Trusted Publishers is set up, no API token / secret is needed.

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: Build sdist + wheel and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/email-service
    permissions:
      # id-token write is required for PyPI Trusted Publisher OIDC exchange.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
