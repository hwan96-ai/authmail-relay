name: release

# Trigger model (CRIT-3 mitigation for private repos):
#   - Tag push (`v*`): runs `build-and-smoke` ONLY. Does NOT publish to PyPI.
#     Tag push proves the package builds and the tag/version match. Nothing
#     reaches PyPI without a second, explicit human step.
#   - `workflow_dispatch`: re-runs `build-and-smoke` against the requested tag
#     AND runs `publish` to PyPI. This trigger is the manual approval gate.
#
# Why split: GitHub Environment "Required reviewers" UI is not available on
# private repos without the appropriate plan. The `environment: pypi` gate
# alone cannot guarantee manual approval there. Splitting the triggers makes
# the workflow_dispatch invocation itself the audited human action.
#
# Required maintainer setup (one-time):
#   1. Register the `email-service` project name on PyPI.
#   2. Configure a Trusted Publisher mapping under "Publishing" for this
#      GitHub repo + the `release` workflow + `pypi` environment.
#      Docs: https://docs.pypi.org/trusted-publishers/
#   3. (Optional, defense-in-depth) In repo Settings → Environments → `pypi`:
#      enable "Required reviewers" if your plan exposes it. The workflow
#      already requires manual dispatch, so this is additive — not the
#      primary gate.
#
# Security notes (CRIT-2 / git-L01):
#   - All third-party actions are pinned to a commit SHA. Do NOT replace
#     these with mutable tags (`@v4`, `@main`, ...). When upgrading, use
#     `gh api repos/{owner}/{repo}/git/refs/tags/{tag} --jq .object.sha`
#     to obtain the new SHA and update the comment line.
#   - Dependabot is recommended for SHA-based updates.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish to PyPI (e.g. v0.4.0). Must already exist on the repo."
        required: true
        type: string

jobs:
  # Stage 1: build sdist + wheel and run a minimal smoke test against the
  # built wheel. Runs on BOTH triggers. Failures here block any publish.
  build-and-smoke:
    name: Build sdist + wheel and run smoke test
    runs-on: ubuntu-latest
    permissions:
      # Read-only — this job MUST NOT have id-token: write.
      contents: read
    steps:
      - name: Resolve ref to build
        id: ref
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            REF="$INPUT_TAG"
          else
            REF="${GITHUB_REF##*/}"
          fi
          if [[ ! "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([._-][A-Za-z0-9]+)*$ ]]; then
            echo "::error::Ref '$REF' must be a safe semantic version tag like v0.4.0"
            exit 1
          fi
          printf 'ref=%s\n' "$REF" >> "$GITHUB_OUTPUT"

      # actions/checkout v4.2.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ steps.ref.outputs.ref }}

      # actions/setup-python v5.3.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Smoke install built wheel
        run: |
          set -euo pipefail
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --upgrade pip
          /tmp/smoke/bin/pip install dist/*.whl

      - name: Smoke import + version check
        run: |
          set -euo pipefail
          /tmp/smoke/bin/python -c "
          import email_service
          from email_service.sender import SmtpSender, SmtpConfig, SendResult
          from email_service.notifiers import MagicLinkNotifier, OTPNotifier
          assert email_service.__version__, 'version missing'
          print('OK', email_service.__version__)
          "

      - name: Verify tag matches package version
        env:
          REF_TO_VERIFY: ${{ steps.ref.outputs.ref }}
        run: |
          set -euo pipefail
          TAG="$REF_TO_VERIFY"                 # e.g. v0.4.0
          TAG_VER="${TAG#v}"                    # e.g. 0.4.0
          PKG_VER=$(/tmp/smoke/bin/python -c "import email_service; print(email_service.__version__)")
          echo "tag=$TAG_VER pkg=$PKG_VER"
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "::error::Tag $TAG_VER does not match package version $PKG_VER"
            exit 1
          fi

      # actions/upload-artifact v7.0.1
      - name: Upload built artifacts for publish job
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 1

  # Stage 2: publish to PyPI. ONLY runs on `workflow_dispatch` — never on
  # tag push. The manual dispatch IS the human approval gate.
  publish:
    name: Publish to PyPI
    needs: build-and-smoke
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/email-service
    permissions:
      # id-token write is required for PyPI Trusted Publisher OIDC exchange.
      # Kept isolated to THIS job so the build-and-smoke job runs with
      # contents:read only.
      id-token: write
      contents: read
    steps:
      # actions/download-artifact v8.0.1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: dist
          path: dist

      # pypa/gh-action-pypi-publish v1.12.4
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc
        with:
          packages-dir: dist
