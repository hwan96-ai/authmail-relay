[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "email-service"
version = "0.1.0"
description = "Reusable SMTP email service with pluggable notifiers (magic-link, OTP)"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7.0", "httpx>=0.25"]
http = ["fastapi>=0.100", "uvicorn>=0.23"]
