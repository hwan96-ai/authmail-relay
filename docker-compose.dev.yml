services:
  authmail-relay:
    build: .
    image: authmail-relay:dev
    container_name: authmail-relay-dev
    environment:
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_USE_TLS: "false"
      API_KEY: ${API_KEY:?Set API_KEY in .env}
      MAGIC_LINK_BASE_URL: http://localhost:3000
      HOST: "0.0.0.0"
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      - mailpit
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    restart: unless-stopped

  # webhook-sink: echoes any POST it receives. Use this to inspect the
  # webhook payload your code sends when you supply webhook_url=http://webhook-sink/post.
  # httpbin's /post echoes the headers + body back as JSON.
  webhook-sink:
    image: kennethreitz/httpbin
    container_name: webhook-sink
    ports:
      - "8080:80"
    restart: unless-stopped
