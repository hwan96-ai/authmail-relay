services:
  email-service:
    build: .
    image: email-service:dev
    container_name: email-service-dev
    environment:
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_USE_TLS: "false"
      API_KEY: dev-secret
      MAGIC_LINK_BASE_URL: http://localhost:3000
      HOST: "0.0.0.0"
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      - mailpit
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    restart: unless-stopped
